# AgoraX — Nginx reverse proxy with vote endpoint log exclusion
#
# Drop this in /etc/nginx/sites-available/agorax and symlink to sites-enabled.
# Then: nginx -t && systemctl reload nginx
#
# B2 evidence: vote endpoints excluded from access logs via map + if directive.

server {
    listen 80;
    server_name agorax.example.com;  # CHANGE THIS

    # ─── Vote endpoint log exclusion (B2) ──────────────────────────────────
    #
    # Map request URI to a flag: 1 = vote endpoint (don't log), 0 = log normally.
    # The 'if' directive in nginx is generally dangerous, but for access_log
    # control it's safe — see nginx docs §Access Log.
    #
    map $request_uri $log_vote_endpoint {
        default         0;
        ~*/blind-sign   1;
        ~*/anonymous-vote 1;
        ~*/verify-receipt 1;
        ~*/blind-key    1;
    }

    # Log normally, except when $log_vote_endpoint = 1
    access_log /var/log/nginx/agorax_access.log main;
    access_log /var/log/nginx/agorax_vote.log main if=$log_vote_endpoint;
    # The agorax_vote.log should be rotated/deleted — it exists only to prove
    # the exclusion works (it should be empty or near-empty in production).

    # ─── Proxy to the API ──────────────────────────────────────────────────

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ─── Security headers ──────────────────────────────────────────────────

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
}
