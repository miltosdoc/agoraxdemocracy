name: AgoraX CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: 20

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npx eslint server/ client/src/ shared/

  test:
    name: Test Suite
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: agorax
          POSTGRES_PASSWORD: agorax_test
          POSTGRES_DB: agorax_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npx drizzle-kit push
        env:
          DATABASE_URL: postgresql://agorax:agorax_test@localhost:5432/agorax_test
      - run: npx vitest run
        env:
          DATABASE_URL: postgresql://agorax:agorax_test@localhost:5432/agorax_test
          NODE_ENV: test

  modularity:
    name: Module Boundary Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: node scripts/check-modularity.cjs

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, test, modularity]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: |
            build/
            client/build/
