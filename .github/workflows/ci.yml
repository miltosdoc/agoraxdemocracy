name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - chore/engineering-polish-foundation

jobs:
  frontend-backend:
    name: TypeScript app checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check i18n keys
        run: npm run check:i18n

      - name: Run unit/integration tests
        run: npm run test:unit

      - name: Build app
        run: npm run build

      - name: TypeScript check
        run: npm run check

  ballot-service:
    name: Ballot service tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: ballot_service/requirements.txt

      - name: Install ballot service dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r ballot_service/requirements.txt pytest

      - name: Run ballot service tests
        working-directory: ballot_service
        run: python -m pytest tests/ -q

  docker-build:
    name: Docker build smoke
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build API image
        run: docker build -t agorax-api:ci .

      - name: Build ballot service image
        run: docker build -t agorax-ballot:ci ballot_service
